<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>PhotoBooth</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
    background:#888;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:30px;
    padding:30px;
    font-family:Arial, sans-serif;
}

.panel{
    background:white;
    padding:20px;
    width:280px;
    border-radius:12px;
}

.panel h2{
    font-size:20px;
    margin-bottom:15px;
}

.panel input,
.panel select,
.panel button{
    width:100%;
    margin-bottom:12px;
    padding:10px;
    font-size:15px;
}

.panel button{
    background:#111;
    color:white;
    border:none;
    cursor:pointer;
}

.frame{
    width:360px;
    height:1080px;
    background:#111;
    padding:14px;
    box-shadow:0 25px 60px rgba(0,0,0,.45);
}

.photo{
    width:100%;
    height:245px;
    object-fit:cover;
    display:block;
    margin-bottom:10px;
    background:#333;
}

.footer{
    color:white;
    text-align:center;
    padding-top:12px;
    line-height:30px;
}

.date{
    font-size:18px;
    letter-spacing:2px;
}

.name{
    font-size:18px;
}

@media(max-width:800px){
    body{
        flex-direction:column;
        align-items:center;
    }
}
</style>
</head>

<body>

<div class="panel">
    <h2>인생네컷 만들기</h2>

    <input type="file" accept="image/*" onchange="loadPhoto(event, 0)">
    <input type="file" accept="image/*" onchange="loadPhoto(event, 1)">
    <input type="file" accept="image/*" onchange="loadPhoto(event, 2)">
    <input type="file" accept="image/*" onchange="loadPhoto(event, 3)">

    <input type="text" id="nameInput" placeholder="문구 입력" value="곽승윤조" oninput="updateText()">

    <select id="colorSelect" onchange="changeColor()">
        <option value="#111">검정 프레임</option>
        <option value="#ffffff">흰색 프레임</option>
        <option value="#f8c8dc">핑크 프레임</option>
        <option value="#bde0fe">하늘색 프레임</option>
    </select>

    <button onclick="saveImage()">PNG 저장</button>
</div>

<div class="frame" id="photoFrame">
    <img class="photo" id="photo0">
    <img class="photo" id="photo1">
    <img class="photo" id="photo2">
    <img class="photo" id="photo3">

    <div class="footer" id="footer">
        <div class="date" id="dateText"></div>
        <div class="name" id="nameText">곽승윤조</div>
    </div>
</div>

<script>
function loadPhoto(event, index){
    const file = event.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(e){
        document.getElementById("photo" + index).src = e.target.result;
    };

    reader.readAsDataURL(file);
}

function updateText(){
    document.getElementById("nameText").innerText =
        document.getElementById("nameInput").value;
}

function changeColor(){
    const color = document.getElementById("colorSelect").value;
    const frame = document.getElementById("photoFrame");
    const footer = document.getElementById("footer");

    frame.style.background = color;

    if(color === "#ffffff" || color === "#f8c8dc" || color === "#bde0fe"){
        footer.style.color = "#111";
    }else{
        footer.style.color = "white";
    }
}

function setToday(){
    const today = new Date();
    const y = today.getFullYear();
    const m = String(today.getMonth() + 1).padStart(2, "0");
    const d = String(today.getDate()).padStart(2, "0");

    document.getElementById("dateText").innerText = `${y}.${m}.${d}`;
}

function saveImage(){
    html2canvas(document.querySelector("#photoFrame"), {
        scale:3,
        useCORS:true
    }).then(function(canvas){
        const link = document.createElement("a");
        link.download = "Life4Cut.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
    });
}

setToday();
</script>

</body>
</html>
