<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life4Cut</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
    background:#8c8c8c;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:24px;
    padding:24px;
    font-family:Arial,sans-serif;
}

.panel{
    background:white;
    width:390px;
    max-width:96%;
    padding:22px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.panel h2{
    text-align:center;
    margin-bottom:18px;
    font-size:24px;
}

.uploadBtn{
    display:block;
    width:100%;
    background:#218bff;
    color:white;
    text-align:center;
    padding:15px;
    border-radius:12px;
    margin-bottom:10px;
    font-weight:bold;
    cursor:pointer;
}

.uploadBtn input{display:none}

.panel input[type="text"],
.panel select{
    width:100%;
    margin-bottom:12px;
    padding:13px;
    font-size:16px;
    border:1px solid #ddd;
    border-radius:10px;
}

.saveBtn{
    width:100%;
    padding:18px;
    font-size:19px;
    font-weight:bold;
    background:#ff3b30;
    color:white;
    border:none;
    border-radius:14px;
    cursor:pointer;
}

.tip{
    font-size:13px;
    color:#555;
    line-height:20px;
    margin:12px 0;
    text-align:center;
}

.orderBox{
    margin:14px 0;
}

.orderItem{
    background:#f1f5f9;
    padding:12px;
    border-radius:10px;
    margin-bottom:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:grab;
}

.orderItem button{
    padding:7px 10px;
    border:none;
    border-radius:8px;
    background:#111;
    color:white;
    cursor:pointer;
}

/* FRAME BASE */
.frame{
    width:380px;
    max-width:96%;
    background:#111;
    padding:14px;
    box-shadow:0 25px 60px rgba(0,0,0,.45);
    position:relative;
    overflow:hidden;
}

.photoArea{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.photoBox{
    width:100%;
    height:230px;
    overflow:hidden;
    background:#333;
    position:relative;
    touch-action:none;
}

.photo{
    position:absolute;
    left:50%;
    top:50%;
    max-width:none;
    max-height:none;
    transform:translate(-50%,-50%) scale(1);
    transform-origin:center center;
    cursor:grab;
    user-select:none;
    -webkit-user-drag:none;
}

.footer{
    color:white;
    text-align:center;
    padding-top:14px;
    padding-bottom:8px;
    line-height:28px;
    position:relative;
    z-index:3;
}

.date{
    font-size:18px;
    font-weight:bold;
    letter-spacing:2px;
}

.name{
    font-size:18px;
    font-weight:bold;
}

/* 2x2 LAYOUT */
.frame.layout-grid{
    width:430px;
    padding:18px;
}

.frame.layout-grid .photoArea{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.frame.layout-grid .photoBox{
    height:260px;
}

.frame.layout-grid .footer{
    padding-top:16px;
}

/* CLASSIC */
.theme-classic{
    background:#111;
}

/* FILM */
.theme-film{
    background:#050505;
    padding:28px 18px 18px;
}

.theme-film::before,
.theme-film::after{
    content:"";
    position:absolute;
    top:0;
    bottom:0;
    width:12px;
    background:repeating-linear-gradient(
        to bottom,
        #f2f2f2 0 8px,
        transparent 8px 24px
    );
    opacity:.85;
}

.theme-film::before{left:4px}
.theme-film::after{right:4px}

.theme-film .photoBox{
    border:1px solid #222;
}

.theme-film .footer::before{
    content:"KEEP YOURSELF ALIVE      PHOTOISM      KEEP YOURSELF ALIVE";
    display:block;
    font-size:8px;
    letter-spacing:1px;
    margin-bottom:6px;
    color:#eee;
}

.theme-film .footer::after{
    content:"52        PHOTOISM        53";
    display:block;
    font-size:8px;
    letter-spacing:2px;
    margin-top:4px;
    color:#eee;
}

/* POLAROID */
.theme-polaroid{
    background:#f9f6ee;
    padding:18px 18px 36px;
    box-shadow:0 25px 60px rgba(0,0,0,.35);
}

.theme-polaroid .photoArea{
    gap:14px;
}

.theme-polaroid .photoBox{
    background:white;
    border:8px solid white;
    box-shadow:0 6px 14px rgba(0,0,0,.12);
}

.theme-polaroid .footer{
    color:#222 !important;
    font-family:"Comic Sans MS", Arial, sans-serif;
}

/* GLASS */
.theme-glass{
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.35);
    box-shadow:0 25px 60px rgba(0,0,0,.35);
}

.theme-glass::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,.35),rgba(255,255,255,0));
    pointer-events:none;
}

.theme-glass .photoBox{
    border:1px solid rgba(255,255,255,.45);
}

.theme-glass .footer{
    color:white;
    text-shadow:0 2px 6px rgba(0,0,0,.45);
}

/* LIGHT TEXT */
.lightText .footer{
    color:#111 !important;
}

@media(max-width:600px){
    body{
        padding:14px;
        gap:18px;
    }

    .panel{
        padding:18px;
    }

    .uploadBtn{
        padding:17px;
        font-size:17px;
    }

    .saveBtn{
        padding:20px;
        font-size:20px;
    }

    .frame{
        width:360px;
    }

    .frame.layout-grid{
        width:360px;
    }

    .frame.layout-grid .photoBox{
        height:210px;
    }

    .photoBox{
        height:220px;
    }
}
</style>
</head>

<body>

<div class="panel">
    <h2>📷 지수네컷 만들기</h2>

    <label class="uploadBtn">사진 1 선택
        <input type="file" accept="image/*" onchange="loadPhoto(event,0)">
    </label>
    <label class="uploadBtn">사진 2 선택
        <input type="file" accept="image/*" onchange="loadPhoto(event,1)">
    </label>
    <label class="uploadBtn">사진 3 선택
        <input type="file" accept="image/*" onchange="loadPhoto(event,2)">
    </label>
    <label class="uploadBtn">사진 4 선택
        <input type="file" accept="image/*" onchange="loadPhoto(event,3)">
    </label>

    <div class="tip">
        사진 안에서 드래그: 위치 이동<br>
        PC: 휠 확대/축소 / 모바일: 두 손가락 확대/축소<br>
        아래 목록 드래그 또는 ↑↓ 버튼으로 순서 변경
    </div>

    <div class="orderBox" id="orderBox"></div>

    <input type="text" id="nameInput" value="지수네컷" oninput="updateText()">

    <select id="layoutSelect" onchange="changeLayout()">
        <option value="vertical">세로 4컷</option>
        <option value="grid">2x2 포토이즘 스타일</option>
    </select>

    <select id="themeSelect" onchange="changeTheme()">
        <option value="classic">Classic</option>
        <option value="film">🎞 Film</option>
        <option value="polaroid">📸 Polaroid</option>
        <option value="glass">✨ Glass</option>
    </select>

    <button class="saveBtn" onclick="saveImage()">💾 PNG 저장</button>
</div>

<div class="frame theme-classic" id="photoFrame">
    <div class="photoArea" id="photoArea">
        <div class="photoBox" data-index="0"><img class="photo" id="photo0"></div>
        <div class="photoBox" data-index="1"><img class="photo" id="photo1"></div>
        <div class="photoBox" data-index="2"><img class="photo" id="photo2"></div>
        <div class="photoBox" data-index="3"><img class="photo" id="photo3"></div>
    </div>

    <div class="footer" id="footer">
        <div class="date" id="dateText"></div>
        <div class="name" id="nameText">지수네컷</div>
    </div>
</div>

<script>
const state = [
    {scale:1,x:0,y:0,baseW:0,baseH:0},
    {scale:1,x:0,y:0,baseW:0,baseH:0},
    {scale:1,x:0,y:0,baseW:0,baseH:0},
    {scale:1,x:0,y:0,baseW:0,baseH:0}
];

let dragIndex=null,startX=0,startY=0,startPhotoX=0,startPhotoY=0;
let touchStartDistance=0,touchStartScale=1,touchStartCenterX=0,touchStartCenterY=0,touchStartPhotoX=0,touchStartPhotoY=0;

function loadPhoto(event,index){
    const file=event.target.files[0];
    if(!file)return;

    const reader=new FileReader();
    reader.onload=function(e){
        const img=document.getElementById("photo"+index);
        img.onload=function(){resetPhoto(index);}
        img.src=e.target.result;
        updateOrder();
    };
    reader.readAsDataURL(file);
}

function resetPhoto(index){
    const img=document.getElementById("photo"+index);
    const box=img.parentElement;

    if(!img.naturalWidth)return;

    const ratio=Math.max(box.clientWidth/img.naturalWidth, box.clientHeight/img.naturalHeight);

    state[index].baseW=img.naturalWidth*ratio;
    state[index].baseH=img.naturalHeight*ratio;
    state[index].scale=1;
    state[index].x=0;
    state[index].y=0;

    img.style.width=state[index].baseW+"px";
    img.style.height=state[index].baseH+"px";

    applyTransform(index);
}

function resetAllLoaded(){
    for(let i=0;i<4;i++){
        const img=document.getElementById("photo"+i);
        if(img.src) resetPhoto(i);
    }
}

function applyTransform(index){
    const img=document.getElementById("photo"+index);
    const s=state[index];
    img.style.transform=`translate(calc(-50% + ${s.x}px), calc(-50% + ${s.y}px)) scale(${s.scale})`;
}

function zoomPhoto(e,index){
    e.preventDefault();
    state[index].scale += e.deltaY < 0 ? 0.08 : -0.08;
    state[index].scale=Math.max(.4,Math.min(5,state[index].scale));
    applyTransform(index);
}

function startDrag(e,index){
    e.preventDefault();
    dragIndex=index;
    startX=e.clientX;
    startY=e.clientY;
    startPhotoX=state[index].x;
    startPhotoY=state[index].y;
}

function moveDrag(e){
    if(dragIndex===null)return;
    state[dragIndex].x=startPhotoX+(e.clientX-startX);
    state[dragIndex].y=startPhotoY+(e.clientY-startY);
    applyTransform(dragIndex);
}

function endDrag(){dragIndex=null;}

function getDistance(t1,t2){
    return Math.hypot(t1.clientX-t2.clientX,t1.clientY-t2.clientY);
}

function getCenter(t1,t2){
    return {
        x:(t1.clientX+t2.clientX)/2,
        y:(t1.clientY+t2.clientY)/2
    };
}

function startTouch(e,index){
    e.preventDefault();
    dragIndex=index;

    if(e.touches.length===1){
        startX=e.touches[0].clientX;
        startY=e.touches[0].clientY;
        startPhotoX=state[index].x;
        startPhotoY=state[index].y;
    }

    if(e.touches.length===2){
        touchStartDistance=getDistance(e.touches[0],e.touches[1]);
        touchStartScale=state[index].scale;
        const c=getCenter(e.touches[0],e.touches[1]);
        touchStartCenterX=c.x;
        touchStartCenterY=c.y;
        touchStartPhotoX=state[index].x;
        touchStartPhotoY=state[index].y;
    }
}

function moveTouch(e,index){
    e.preventDefault();
    if(dragIndex===null)return;

    if(e.touches.length===1){
        state[index].x=startPhotoX+(e.touches[0].clientX-startX);
        state[index].y=startPhotoY+(e.touches[0].clientY-startY);
    }

    if(e.touches.length===2){
        const newDistance=getDistance(e.touches[0],e.touches[1]);
        state[index].scale=touchStartScale*(newDistance/touchStartDistance);
        state[index].scale=Math.max(.4,Math.min(5,state[index].scale));

        const c=getCenter(e.touches[0],e.touches[1]);
        state[index].x=touchStartPhotoX+(c.x-touchStartCenterX);
        state[index].y=touchStartPhotoY+(c.y-touchStartCenterY);
    }

    applyTransform(index);
}

function updateText(){
    document.getElementById("nameText").innerText=document.getElementById("nameInput").value;
}

function changeLayout(){
    const frame=document.getElementById("photoFrame");
    const layout=document.getElementById("layoutSelect").value;

    frame.classList.remove("layout-grid");

    if(layout==="grid"){
        frame.classList.add("layout-grid");
    }

    setTimeout(resetAllLoaded,100);
}

function changeTheme(){
    const frame=document.getElementById("photoFrame");
    const theme=document.getElementById("themeSelect").value;

    frame.className="frame";

    if(document.getElementById("layoutSelect").value==="grid"){
        frame.classList.add("layout-grid");
    }

    frame.classList.add("theme-"+theme);

    if(theme==="polaroid"){
        frame.classList.add("lightText");
    }

    setTimeout(resetAllLoaded,100);
}

function setToday(){
    const t=new Date();
    document.getElementById("dateText").innerText=
        `${t.getFullYear()}.${String(t.getMonth()+1).padStart(2,"0")}.${String(t.getDate()).padStart(2,"0")}`;
}

function saveImage(){
    updateText();

    html2canvas(document.querySelector("#photoFrame"),{
        scale:3,
        useCORS:true,
        backgroundColor:null
    }).then(canvas=>{
        const link=document.createElement("a");
        link.download="Life4Cut.png";
        link.href=canvas.toDataURL("image/png");
        link.click();
    });
}

function movePhotoBox(from,to){
    const area=document.getElementById("photoArea");
    const boxes=[...area.querySelectorAll(".photoBox")];

    if(to<0 || to>=boxes.length)return;

    if(from<to){
        area.insertBefore(boxes[from], boxes[to].nextSibling);
    }else{
        area.insertBefore(boxes[from], boxes[to]);
    }

    updateOrder();
}

function updateOrder(){
    const orderBox=document.getElementById("orderBox");
    const boxes=[...document.querySelectorAll(".photoBox")];

    orderBox.innerHTML="";

    boxes.forEach((box,pos)=>{
        const index=box.dataset.index;
        const item=document.createElement("div");

        item.className="orderItem";
        item.draggable=true;
        item.dataset.pos=pos;
        item.innerHTML=`
            <span>사진 ${Number(index)+1}</span>
            <div>
                <button onclick="movePhotoBox(${pos},${pos-1})">↑</button>
                <button onclick="movePhotoBox(${pos},${pos+1})">↓</button>
            </div>
        `;

        item.addEventListener("dragstart",e=>{
            e.dataTransfer.setData("text/plain",pos);
        });

        item.addEventListener("dragover",e=>e.preventDefault());

        item.addEventListener("drop",e=>{
            e.preventDefault();
            const from=Number(e.dataTransfer.getData("text/plain"));
            const to=Number(item.dataset.pos);
            movePhotoBox(from,to);
        });

        item.addEventListener("touchstart",e=>{
            item.dataset.touchY=e.touches[0].clientY;
        },{passive:true});

        item.addEventListener("touchend",e=>{
            const startY=Number(item.dataset.touchY);
            const endY=e.changedTouches[0].clientY;
            const diff=endY-startY;

            if(diff>35) movePhotoBox(pos,pos+1);
            if(diff<-35) movePhotoBox(pos,pos-1);
        },{passive:true});

        orderBox.appendChild(item);
    });
}

for(let i=0;i<4;i++){
    const img=document.getElementById("photo"+i);

    img.addEventListener("wheel",e=>zoomPhoto(e,i),{passive:false});
    img.addEventListener("mousedown",e=>startDrag(e,i));
    img.addEventListener("touchstart",e=>startTouch(e,i),{passive:false});
    img.addEventListener("touchmove",e=>moveTouch(e,i),{passive:false});
    img.addEventListener("touchend",()=>dragIndex=null);
    img.addEventListener("dblclick",()=>resetPhoto(i));
}

document.addEventListener("mousemove",moveDrag);
document.addEventListener("mouseup",endDrag);

setToday();
updateOrder();
</script>

</body>
</html>
