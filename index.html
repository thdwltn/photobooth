<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<title>Life4Cut</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#8f8f8f;

    display:flex;

    justify-content:center;

    align-items:center;

    min-height:100vh;

    font-family:Arial;

}

.wrapper{

    text-align:center;

}

.frame{

    width:360px;

    background:#111;

    padding:12px;

    box-shadow:0 25px 60px rgba(0,0,0,.45);

}


.photo{

    width:100%;

    height:255px;

    object-fit:cover;

    display:block;

    margin-bottom:8px;

}

.footer{

    color:white;

    text-align:center;

    padding-top:10px;

    line-height:30px;

}

.date{

    font-size:18px;

    letter-spacing:2px;

}

.name{

    font-size:18px;

}

button{

    margin-top:25px;

    padding:12px 30px;

    border:none;

    background:#111;

    color:white;

    font-size:17px;

    cursor:pointer;

}

button:hover{

    background:#333;

}

</style>

</head>

<body>

<div class="wrapper">

<div class="frame" id="photo">


<img src="phpto1.jpg" class="photo">
<img src="phpto2.jpg" class="photo">
<img src="phpto3.jpg" class="photo">
<img src="phpto4.jpg" class="photo">

<div class="footer">

<div class="date">
2026.06.17
</div>

<div class="name">
곽승윤조
</div>

</div>

</div>

<button onclick="saveImage()">
PNG 저장
</button>

</div>

<script>

function saveImage(){

html2canvas(document.querySelector("#photo"),{

scale:3

}).then(function(canvas){

let link=document.createElement("a");

link.download="Life4Cut.png";

link.href=canvas.toDataURL("image/png");

link.click();

});

}

</script>

</body>

</html>
