<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Life4Cut</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
    background:#888;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:30px;
    padding:30px;
    font-family:Arial,sans-serif;
}

.panel{
    background:white;
    width:280px;
    padding:20px;
    border-radius:12px;
}

.panel h2{
    margin-bottom:15px;
    font-size:22px;
}

.panel input,
.panel select,
.panel button{
    width:100%;
    margin-bottom:12px;
    padding:10px;
    font-size:15px;
}

.panel button{
    background:#111;
    color:white;
    border:none;
    cursor:pointer;
}

.frame{
    width:360px;
    background:#111;
    padding:14px;
    box-shadow:0 25px 60px rgba(0,0,0,.45);
}

.photoBox{
    width:100%;
    height:230px;
    overflow:hidden;
    margin-bottom:10px;
    background:#333;
    position:relative;
}

.photo{
    position:absolute;
    left:50%;
    top:50%;
    max-width:none;
    max-height:none;
    transform:translate(-50%,-50%) scale(1);
    transform-origin:center center;
    cursor:grab;
    user-select:none;
    -webkit-user-drag:none;
}

.footer{
    color:white;
    text-align:center;
    padding-top:12px;
    padding-bottom:10px;
    line-height:28px;
}

.date{
    font-size:18px;
    font-weight:bold;
    letter-spacing:2px;
}

.name{
    font-size:18px;
    font-weight:bold;
}

.tip{
    font-size:12px;
    color:#555;
    line-height:18px;
    margin-bottom:12px;
}

@media(max-width:800px){
    body{
        flex-direction:column;
        align-items:center;
    }
}
</style>
</head>

<body>

<div class="panel">
    <h2>인생네컷 만들기</h2>

    <input type="file" accept="image/*" onchange="loadPhoto(event,0)">
    <input type="file" accept="image/*" onchange="loadPhoto(event,1)">
    <input type="file" accept="image/*" onchange="loadPhoto(event,2)">
    <input type="file" accept="image/*" onchange="loadPhoto(event,3)">

    <div class="tip">
        사진 위에서 마우스 휠: 확대/축소<br>
        사진 드래그: 위치 이동<br>
        더블클릭: 사진 위치 초기화
    </div>

    <input type="text" id="nameInput" value="지수네컷" oninput="updateText()">

    <select id="colorSelect" onchange="changeColor()">
        <option value="#111">검정 프레임</option>
        <option value="#ffffff">흰색 프레임</option>
        <option value="#f8c8dc">핑크 프레임</option>
        <option value="#bde0fe">하늘색 프레임</option>
    </select>

    <button onclick="saveImage()">PNG 저장</button>
</div>

<div class="frame" id="photoFrame">

    <div class="photoBox">
        <img class="photo" id="photo0">
    </div>

    <div class="photoBox">
        <img class="photo" id="photo1">
    </div>

    <div class="photoBox">
        <img class="photo" id="photo2">
    </div>

    <div class="photoBox">
        <img class="photo" id="photo3">
    </div>

    <div class="footer" id="footer">
        <div class="date" id="dateText"></div>
        <div class="name" id="nameText">지수네컷</div>
    </div>

</div>

<script>
const state = [
    {scale:1, x:0, y:0, naturalW:0, naturalH:0, baseW:0, baseH:0},
    {scale:1, x:0, y:0, naturalW:0, naturalH:0, baseW:0, baseH:0},
    {scale:1, x:0, y:0, naturalW:0, naturalH:0, baseW:0, baseH:0},
    {scale:1, x:0, y:0, naturalW:0, naturalH:0, baseW:0, baseH:0}
];

let dragIndex = null;
let startX = 0;
let startY = 0;
let startPhotoX = 0;
let startPhotoY = 0;

function loadPhoto(event,index){
    const file = event.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(e){
        const img = document.getElementById("photo"+index);

        img.onload = function(){
            resetPhoto(index);
        };

        img.src = e.target.result;
    };

    reader.readAsDataURL(file);
}

function resetPhoto(index){
    const img = document.getElementById("photo"+index);
    const box = img.parentElement;

    const boxW = box.clientWidth;
    const boxH = box.clientHeight;

    const imgW = img.naturalWidth;
    const imgH = img.naturalHeight;

    const ratio = Math.max(boxW / imgW, boxH / imgH);

    state[index].baseW = imgW * ratio;
    state[index].baseH = imgH * ratio;
    state[index].scale = 1;
    state[index].x = 0;
    state[index].y = 0;

    img.style.width = state[index].baseW + "px";
    img.style.height = state[index].baseH + "px";

    applyTransform(index);
}

function applyTransform(index){
    const img = document.getElementById("photo"+index);
    const s = state[index];

    img.style.transform =
        `translate(calc(-50% + ${s.x}px), calc(-50% + ${s.y}px)) scale(${s.scale})`;
}

function zoomPhoto(event,index){
    event.preventDefault();

    const s = state[index];

    if(event.deltaY < 0){
        s.scale += 0.08;
    }else{
        s.scale -= 0.08;
    }

    if(s.scale < 0.4) s.scale = 0.4;
    if(s.scale > 5) s.scale = 5;

    applyTransform(index);
}

function startDrag(event,index){
    event.preventDefault();

    dragIndex = index;
    startX = event.clientX;
    startY = event.clientY;
    startPhotoX = state[index].x;
    startPhotoY = state[index].y;

    document.getElementById("photo"+index).style.cursor = "grabbing";
}

function moveDrag(event){
    if(dragIndex === null) return;

    const dx = event.clientX - startX;
    const dy = event.clientY - startY;

    state[dragIndex].x = startPhotoX + dx;
    state[dragIndex].y = startPhotoY + dy;

    applyTransform(dragIndex);
}

function endDrag(){
    if(dragIndex !== null){
        document.getElementById("photo"+dragIndex).style.cursor = "grab";
    }

    dragIndex = null;
}

function updateText(){
    document.getElementById("nameText").innerText =
        document.getElementById("nameInput").value;
}

function changeColor(){
    const color = document.getElementById("colorSelect").value;
    const frame = document.getElementById("photoFrame");
    const footer = document.getElementById("footer");

    frame.style.background = color;

    if(color === "#ffffff" || color === "#f8c8dc" || color === "#bde0fe"){
        footer.style.color = "#111";
    }else{
        footer.style.color = "white";
    }
}

function setToday(){
    const today = new Date();
    const y = today.getFullYear();
    const m = String(today.getMonth()+1).padStart(2,"0");
    const d = String(today.getDate()).padStart(2,"0");

    document.getElementById("dateText").innerText = `${y}.${m}.${d}`;
}

function saveImage(){
    updateText();

    html2canvas(document.querySelector("#photoFrame"),{
        scale:3,
        useCORS:true,
        backgroundColor:null
    }).then(function(canvas){
        const link = document.createElement("a");
        link.download = "Life4Cut.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
    });
}

for(let i=0; i<4; i++){
    const img = document.getElementById("photo"+i);

    img.addEventListener("wheel", function(e){
        zoomPhoto(e,i);
    });

    img.addEventListener("mousedown", function(e){
        startDrag(e,i);
    });

    img.addEventListener("dblclick", function(){
        resetPhoto(i);
    });
}

document.addEventListener("mousemove", moveDrag);
document.addEventListener("mouseup", endDrag);

setToday();
</script>

</body>
</html>
